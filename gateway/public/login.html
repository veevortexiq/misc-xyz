<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vArena — Sign in</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(1200px 600px at 50% -10%, #1d2333, #0a0c12);
        color: #e7e9ee;
      }
      .card {
        width: min(92vw, 380px); padding: 40px 32px; border-radius: 16px;
        background: rgba(20, 24, 34, 0.7); border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center;
        backdrop-filter: blur(8px);
      }
      h1 { margin: 0 0 4px; font-size: 28px; letter-spacing: -0.02em; }
      p { margin: 0 0 28px; color: #97a0b3; font-size: 14px; }
      button {
        width: 100%; padding: 12px 16px; border-radius: 10px; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.12); background: #fff; color: #1a1a1a;
        font-size: 15px; font-weight: 600; display: inline-flex; gap: 10px;
        align-items: center; justify-content: center; transition: transform .05s ease;
      }
      button:active { transform: scale(0.99); }
      button:disabled { opacity: 0.6; cursor: default; }
      .err { margin-top: 16px; color: #ff8a8a; font-size: 13px; min-height: 18px; }
      svg { width: 18px; height: 18px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>vArena</h1>
      <p>Sign in with your team Google account</p>
      <button id="signin">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
        Continue with Google
      </button>
      <div class="err" id="err"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
      import {
        getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, browserSessionPersistence,
      } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

      const app = initializeApp({
        apiKey: "__API_KEY__",
        authDomain: "__AUTH_DOMAIN__",
        projectId: "__PROJECT_ID__",
      });
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      const btn = document.getElementById("signin");
      const err = document.getElementById("err");

      btn.addEventListener("click", async () => {
        err.textContent = "";
        btn.disabled = true;
        try {
          await setPersistence(auth, browserSessionPersistence);
          const cred = await signInWithPopup(auth, provider);
          const idToken = await cred.user.getIdToken();
          const resp = await fetch("/__varena/session", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ idToken }),
          });
          if (resp.ok) {
            window.location.replace("/");
          } else {
            const body = await resp.json().catch(() => ({}));
            err.textContent = body.error || "Sign-in rejected.";
            btn.disabled = false;
          }
        } catch (e) {
          err.textContent = e?.message || "Sign-in failed.";
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
